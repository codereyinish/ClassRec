<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/favicon.png">

    <!-- Fonts: DM Serif Display + DM Mono -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* ===== DESIGN TOKENS ===== */
        :root {
            --bg:           #0d0d11;
            --bg-surface:   #14141a;
            --bg-elevated:  #1c1c26;
            --border:       rgba(255,255,255,0.07);
            --text:         #f0ebe0;
            --text-muted:   #7a7a8a;
            --accent:       #e8a020;
            --accent-dim:   rgba(232,160,32,0.12);
            --accent-glow:  rgba(232,160,32,0.3);
            --red:          #e05252;
            --green:        #52a878;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;

            /* Subtle noise texture overlay */
            background-image:
                radial-gradient(ellipse 80% 50% at 20% 20%, rgba(232,160,32,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(100,80,200,0.04) 0%, transparent 60%);
        }

        /* ===== FIXED HEADER ===== */
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: rgba(13,13,17,0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            z-index: 100;
        }

        /* Logo / wordmark */
        .site-logo {
            font-family: 'DM Serif Display', serif;
            font-size: 18px;
            color: var(--text);
            text-decoration: none;
            letter-spacing: 0.01em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .site-logo-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(0.8); }
        }

        /* Back link */
        .back-link {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
            text-decoration: none;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .back-link:hover { color: var(--text); }

        /* Header right — clerk mounts here */
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* ===== PAGE CONTENT ===== */
        .page-wrapper {
            padding-top: 76px;
            padding-left: 24px;
            padding-right: 24px;
            padding-bottom: 40px;
            max-width: 1440px;
            margin: 0 auto;
        }

        /* ===== SHARED SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ===== SHARED CARD ===== */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        /* ===== SHARED BUTTON ===== */
        .btn-primary {
            background: var(--accent);
            color: #0d0d11;
            border: none;
            border-radius: 7px;
            padding: 10px 22px;
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.02em;
        }
        .btn-primary:hover {
            background: #f0aa28;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .btn-primary:disabled {
            background: var(--bg-elevated);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* ===== STATUS BADGE ===== */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }
        .status-badge.recording {
            color: var(--red);
            border-color: rgba(224,82,82,0.3);
            background: rgba(224,82,82,0.08);
        }
        .status-badge.recording::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--red);
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }
    </style>

    <!-- ===== SHARED SCRIPTS ===== -->
    <script src="/static/js/tracker.js"></script>

    <!-- ===== CLERK SDK ===== -->
    <script
        async
        crossorigin="anonymous"
        data-clerk-publishable-key="{{ clerk_key }}"
        src="https://ethical-macaw-49.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
        type="text/javascript"
    ></script>
    <script src="/static/js/auth.js"></script>

    <!-- ===== EACH PAGE INJECTS ITS OWN HEAD CONTENT HERE ===== -->
    {% block head %}{% endblock %}
</head>
<body>

    <!-- ===== FIXED HEADER ===== -->
    <header class="site-header">
        <a href="/" class="site-logo">
            <div class="site-logo-dot"></div>
            ClassRec
        </a>

        <div class="header-right">
            <div id="clerk-auth-mount"></div>
        </div>
    </header>

    <!-- ===== PAGE CONTENT ===== -->
    <div class="page-wrapper">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
