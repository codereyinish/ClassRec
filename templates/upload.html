{% extends "base.html" %}

{% block head %}
<title>Upload Audio - Lecture Transcription</title>
<link rel="stylesheet" href="/static/css/upload.css"
{% endblock %}

{% block content %}
    <div class="page-title">
        <h1>Upload <em>Audio</em></h1>
        <p>Transcribe your lecture recording with AI</p>
    </div>

    <div class="container">
        <div class="upload-card">
            <div class="upload-box">
                <div class="upload-icon">📁</div>
                <p class="upload-label">Drop your audio file here or <strong>browse</strong></p>
                <input type="file" id="audioFile" accept="audio/*">
            </div>
            <div class="upload-btn-wrap">
                <button id="uploadBtn">Transcribe Audio →</button>
            </div>
        </div>
        <div id="result"></div>
    </div>
   <script src="/static/js/upload.js"></script>
{% endblock %}
