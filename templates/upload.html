{% extends "base.html" %}

{% block head %}
<title>Upload Audio - Lecture Transcription</title>
<link rel="icon" href="/static/favicon.png">
<style>
    .page-title {
        text-align: center;
        margin-bottom: 32px;
    }

    .page-title h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--text);
    }

    .page-title h1 em {
        font-style: italic;
        color: var(--accent);
    }
    .page-title p {
    color: #a8a8b8;
    }

    .container {
        max-width: 680px;
        margin: 0 auto;
    }

    /* Upload card */
    .upload-card {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 40px 36px;
    }

    .upload-box {
        border: 2px dashed rgba(232,160,32,0.3);
        border-radius: 12px;
        padding: 44px 40px;
        text-align: center;
        background: var(--accent-dim);
        transition: border-color 0.2s, background 0.2s;
        cursor: pointer;
    }
    .upload-box:hover {
        border-color: var(--accent);
        background: rgba(232,160,32,0.08);
    }

    .upload-icon {
        font-size: 40px;
        margin-bottom: 14px;
        opacity: 0.6;
    }

    .upload-label {
        font-size: 14px;
        color: var(--text-muted);
        margin-bottom: 16px;
        letter-spacing: 0.03em;
    }
    .upload-label strong { color: var(--text); }

    input[type="file"] {
        display: block;
        margin: 0 auto;
        font-size: 12px;
        font-family: 'DM Mono', monospace;
        color: var(--text-muted);
        cursor: pointer;
    }
    input[type="file"]::file-selector-button {
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 14px;
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        color: var(--text);
        cursor: pointer;
        margin-right: 10px;
        transition: border-color 0.2s;
    }
    input[type="file"]::file-selector-button:hover { border-color: var(--accent); }

    .upload-btn-wrap { margin-top: 28px; text-align: center; }

    #uploadBtn {
        background: var(--accent);
        color: #0d0d11;
        padding: 12px 40px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        font-family: 'DM Mono', monospace;
        font-weight: 500;
        letter-spacing: 0.04em;
        transition: all 0.2s;
    }
    #uploadBtn:hover { background: #f0aa28; box-shadow: 0 0 24px var(--accent-glow); }
    #uploadBtn:disabled {
        background: var(--bg-elevated);
        color: var(--text-muted);
        cursor: not-allowed;
        box-shadow: none;
    }

    /* Result */
    #result {
        margin-top: 20px;
        padding: 24px;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        display: none;
        line-height: 1.6;
        font-size: 13px;
        color: var(--text);
    }

    .loading {
        color: var(--accent);
        font-weight: 500;
        letter-spacing: 0.03em;
    }

    .result-meta {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border);
        letter-spacing: 0.03em;
    }
    .result-meta span { color: var(--text); }

    .transcription-container {
        position: relative;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        padding: 16px 16px 52px 16px;
        border-radius: 8px;
        margin-top: 10px;
    }

    #transcriptionText {
        font-size: 14px;
        color: var(--text);
        line-height: 1.75;
        display: block;
    }

    .copy-btn {
        position: absolute;
        bottom: 12px;
        right: 12px;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        color: var(--text-muted);
        padding: 6px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        font-family: 'DM Mono', monospace;
        letter-spacing: 0.04em;
        transition: all 0.2s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.dimmed { opacity: 0.35; }

    .error-text { color: var(--red); font-size: 13px; }
    .success-label { color: var(--green); font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 12px; font-weight: 500; }
</style>
{% endblock %}

{% block content %}
    <div class="page-title">
        <h1>Upload <em>Audio</em></h1>
        <p>Transcribe your lecture recording with AI</p>
    </div>

    <div class="container">
        <div class="upload-card">
            <div class="upload-box">
                <div class="upload-icon">📁</div>
                <p class="upload-label">Drop your audio file here or <strong>browse</strong></p>
                <input type="file" id="audioFile" accept="audio/*">
            </div>
            <div class="upload-btn-wrap">
                <button id="uploadBtn">Transcribe Audio →</button>
            </div>
        </div>
        <div id="result"></div>
    </div>
    <script>
            // ===== 0. LOGGER =====
           const Logger = {
                   DEBUG: true,
                   debug: (msg, data = '') => {
                       if (Logger.DEBUG) console.log(`[DEBUG] ${msg}`, data);
                   },
                   error: (msg, data = '') => {
                       console.error(`[ERROR] ${msg}`, data);
                   }
           };


            const DOM = {
                 audioFileInput:  document.getElementById('audioFile'),
                 resultDiv:  document.getElementById('result'),
                 uploadBtn:  document.getElementById('uploadBtn'),
            }


            //===== FILE_UPLOAD_TRACKING
            let selectedAudioFile = null;
            let audioFileDuration = 0;


            function buildFormData(Selected_file){
                const formData = new FormData();
                formData.append('file', Selected_file);
                return formData
            }

            function show_Transcription_Loading_State(){
                DOM.uploadBtn.disabled = true;
                DOM.resultDiv.style.display = 'block';
                DOM.resultDiv.innerHTML = '<p class="loading">⏳ Transcribing... This may take 10-30 seconds</p>';
            }

            async function transcribeAudio(formData){
                    const response = await fetch('/transcribe', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();

                    //Throw Error
                    if(!response.ok){
                        throw new Error(data.detail || 'Transcription failed');
                    }
                    return data;
            }

            function extractAudioDuration(audioFile){
                 return new Promise((resolve, reject) => {
                    const url = URL.createObjectURL(audioFile);
                    const audio = new Audio();
                    audio.onloadedmetadata = () => {
                        resolve(audio.duration/ 60);
                        setTimeout(() => URL.revokeObjectURL(url), 1000);
                    }
                    audio.onerror = () => {
                        URL.revokeObjectURL(url)  // ← on failure
                        reject(new Error('Could not read audio duration'))
                    }
                    audio.src = url;
                 })
            }


            DOM.audioFileInput.addEventListener('change', async(e) => {
                selectedAudioFile = e.target.files[0];
                if(!selectedAudioFile) return;

                audioFileDuration = await extractAudioDuration(selectedAudioFile);
                Logger.debug("Audio Duration is" ,audioFileDuration)
            });




            async function handleUpload() {
                if(!selectedAudioFile){
                 alert('Please select a file first!');
                 return;
                }

                let uploadPermission = UsageTracker.canUpload(audioFileDuration)
                if(!uploadPermission.allowed){
                    add_ErrorMessage_to_ResultDiv(uploadPermission.reason);
                    return;
                }

                show_Transcription_Loading_State();
                try{
                    const formData = buildFormData(selectedAudioFile);
                    const data = await transcribeAudio(formData);
                    add_Transcription_to_ResultDiv(data);
                    UsageTracker.addUploadMinutes(audioFileDuration);
                    Logger.debug("UploadMins:" , UsageTracker.getUploadMinutes())
                    enableCopyButton(data);
                }
                catch (error){
                    add_ErrorMessage_to_ResultDiv(error.message);
                }
                finally {
                DOM.uploadBtn.disabled = false;  // ← Cleanup HERE
                }

            }


            function add_Transcription_to_ResultDiv(data){
                DOM.resultDiv.innerHTML=
                        '<strong>✅ Transcription Complete!</strong><br><br>' +
                        '<strong>File:</strong> ' + data.filename + '<br>' +
                        '<strong>Size:</strong> ' + data.file_size_mb + ' MB<br><br>' +
                        '<strong>Text:</strong><br>' +
                        '<div class="transcription-container">' +
                            '<span id="transcriptionText"></span>' +
                            '<button class="copy-btn" id="copyBtn">📋 Copy</button>' +
                        '</div>';
                document.getElementById('transcriptionText').textContent = data.transcription;
            }


            function add_ErrorMessage_to_ResultDiv(ErrorMessage){
               DOM.resultDiv.style.display = 'block';
               DOM.resultDiv.innerHTML = '<strong>❌ Error:</strong> ' + ErrorMessage;

            }

            function enableCopyButton(data){
                document.getElementById('copyBtn').addEventListener('click', function() {
                            copyToClipboard(data.transcription, this);
                });
            }


            function copyToClipboard(text, buttonElement) {
                navigator.clipboard.writeText(text).then(() => {
                    buttonElement.classList.add('dimmed');
                    setTimeout(() => {
                        buttonElement.classList.remove('dimmed');
                    }, 2000);
                }).catch(err => {
                    alert('Failed to copy text: ' + err);
                });
            }


            DOM.uploadBtn.addEventListener('click', handleUpload);
    </script>
{% endblock %}
